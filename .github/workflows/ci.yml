name: tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: php ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: xdebug

      - name: Validate composer.json
        run: composer validate --strict

      - name: Run composer install
        run: composer install -n --prefer-dist --dev

      - name: Run PHPUnit with coverage
        run: php ./vendor/bin/phpunit --coverage-text

      - name: Run PHPStan
        run: php ./vendor/bin/phpstan analyse -c phpstan.neon

      - name: Verify example code generation is reproducible
        run: php example/generate_code.php

      - name: Check for unexpected generated code changes
        run: git diff --exit-code
